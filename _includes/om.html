{% assign section = site.sections | where: "slug", "om" | first %}
<section id="about" class="about">
  <div class="container">
    <div class="row">
      <div class="col-lg-7 col-lg-offset-1">
        <h2>{{ section.title }}</h2>
        <div class="lead">
        {{ section.content }}
        </div>
      </div>
      {% if section.image %}
      <div class="col-lg-3 text-center">
        <picture>
          <source srcset="{{ section.image | replace: '.jpg', '.webp' }}" type="image/webp">
          <img src="{{ section.image }}" alt="Portræt af keramiker Eva Kobel, EK Keramik" class="section-image" width="401" height="540" loading="lazy">
        </picture>
      </div>
      {% endif %}
    </div>
    <!-- /.row -->
  </div>
  <!-- /.container -->
</section>
