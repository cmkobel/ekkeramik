{% assign section = site.sections | where: "slug", "header" | first %}
<header id="top" class="header">
  <div class="text-vertical-center">
    <h1 class="sr-only">EK Keramik – Keramik af Eva Kobel, Fyn</h1>
    <picture>
      <source srcset="{{ section.image | replace: '.png', '.webp' }}" type="image/webp">
      <img src="{{ section.image }}" alt="EK Keramik logo – keramiker Eva Kobel, Fyn" class="header-logo" width="800" height="139">
    </picture>
    <h2>{{ section.subtitle }}</h2>
  </div>
</header>
