# Single source of truth for shops, markets, and past venues.
# Flip `active` to move an entry between "Udstilling og salg" and "Tidligere udstillinger".
#   active: true  → shows under "Udstilling og salg" (in the "Butikker" or "Markeder" group, by `type`)
#                   uses name, url, description, address, date, featured
#   active: false → shows under "Tidligere udstillinger"
#                   uses name, url, description only
#
# Past venues are rendered in YAML order. To put a newly-retired venue at the top of
# "Tidligere udstillinger", place it at the top of the past block below.

